# =============================================================================
# DEPRECATED — do not use for development or phase validation.
# =============================================================================
# Project DB policy (authoritative): architecture/database.md
# Decision: Neon Postgres EVERYWHERE (dev, validation, staging, prod).
#
# This file is kept only for historical reference from Phase 0 scaffolding.
# Pointing DATABASE_URL at this local container creates data drift between
# laptops and breaks the "one Neon branch per phase Git branch" workflow.
#
# To set up a database: see README.md "Database policy" or architecture/database.md.
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postdash_postgres
    environment:
      POSTGRES_USER: postdash
      POSTGRES_PASSWORD: postdash
      POSTGRES_DB: postdash
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postdash']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
