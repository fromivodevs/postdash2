services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postdash_postgres
    environment:
      POSTGRES_USER: postdash
      POSTGRES_PASSWORD: postdash
      POSTGRES_DB: postdash
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postdash']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
